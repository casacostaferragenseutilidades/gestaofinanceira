[build]
  command = "npm run build:netlify && npm run build:functions"
  publish = "dist/public"
  functions = "netlify/functions"

[functions]
  node_bundle = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
